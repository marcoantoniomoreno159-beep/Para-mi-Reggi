<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tengo una pregunta para ti... ❤️</title>
    <style>
        /* --- TODO EL CSS ANTERIOR SE MANTIENE IGUAL --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            text-align: center;
            overflow: hidden;
        }

        .contenedor {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            z-index: 10;
            max-width: 90%;
            width: 400px;
        }

        /* --- NUEVO ESTILO PARA LA IMAGEN --- */
        .foto-perfil {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* Hace la foto circular */
            border: 5px solid white;
            object-fit: cover; /* Evita que la foto se estire */
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 { color: #d63031; font-size: 1.8rem; margin-bottom: 15px; }
        p { color: #555; font-size: 1rem; margin-bottom: 30px; }

        .zona-botones {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 60px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #btnSi { background-color: #ff4757; color: white; }
        #btnNo { background-color: #a4b0be; color: white; position: absolute; }

        .corazon { position: absolute; color: #ff4757; pointer-events: none; animation: flotar 4s linear infinite; opacity: 0; }
        @keyframes flotar {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <img src="tu-foto.jpg" alt="Nuestra foto" class="foto-perfil" id="imagenPrincipal">
        
        <h1 id="titulo">¿Quieres salir conmigo hoy a una cita mi Reggi? 🌹</h1>
        <p id="subtitulo">Prometo que será un día inolvidable, dejalo en mis manos aunque se que aveces se te hace dificil mi amor.</p>
        
        <div class="zona-botones">
            <button id="btnSi" onclick="aceptar()">¡SÍ! 🥰</button>
            <button id="btnNo" onmouseover="moverBoton()" onclick="moverBoton()">No 😢</button>
        </div>
    </div>

    <script>
        function aceptar() {
            document.getElementById('titulo').innerHTML = "¡SIII! 🎉❤️";
            document.getElementById('subtitulo').innerHTML = "¡Me haces muy feliz! Nos vemos hoy cariño a las 7:00 PM.";
            
            // OPCIONAL: Puedes cambiar la imagen cuando diga que SÍ
            // document.getElementById('imagenPrincipal').src = "Nuestra Cita.jpg"

            document.querySelector('.zona-botones').style.display = 'none';
            lluviaDeCorazones();
        }

        function moverBoton() {
            const btnNo = document.getElementById('btnNo');
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 20);
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        function lluviaDeCorazones() {
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const corazon = document.createElement('div');
                    corazon.classList.add('corazon');
                    corazon.innerHTML = '❤️';
                    corazon.style.left = Math.random() * 100 + 'vw';
                    corazon.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    document.body.appendChild(corazon);
                    setTimeout(() => corazon.remove(), 5000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
